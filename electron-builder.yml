appId: ai.swarmclaw.desktop
productName: SwarmClaw
copyright: Copyright © 2026 SwarmClaw

directories:
  output: release
  buildResources: resources

extraMetadata:
  main: electron-dist/main.js

asar: true

files:
  - electron-dist/**/*
  - package.json
  - '!**/*.map'
  - '!**/*.ts'
  - '!**/*.md'

extraResources:
  - from: .next/standalone
    to: .next/standalone
    filter:
      - '**/*'
      - '!**/*.map'

publish:
  provider: github
  owner: swarmclawai
  repo: swarmclaw
  releaseType: release

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  icon: resources/icon.icns
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
  # Unsigned builds. Users open via right-click, then Open, on first launch.

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: SwarmClaw

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
  icon: resources/icon.png
  synopsis: Build and run autonomous AI agents.
  maintainer: SwarmClaw <noreply@swarmclaw.ai>
  vendor: SwarmClaw
  # Override artifact name so the npm scope slash (@swarmclawai/) does not
  # leak into the .deb output path (fpm can't create parent dirs and fails
  # with "Parent directory does not exist: .../release/@swarmclawai").
  artifactName: ${productName}-${version}-${arch}.${ext}
